# 명세서 작성 프롬프트 목록
# 9개 프롬프트를 아래 형식에 맞춰 채워주세요.
# 변수는 프롬프트 내용에 {{변수명}} 형태로 삽입되는 항목입니다.

prompts:
  - id: 1
    name: "Composition Prompt"                  # 예: "기본 독립항 작성"
    model: "gpt-5.2"                 # 예: "claude-opus-4-8", "gpt-4o" 등
    role: "발명 텍스트에서 구성요소·목적·효과를 파싱하는 프롬프트"                  # 한 줄 요약: 이 프롬프트가 하는 일
    content: |
      다음 발명을 출원하고 싶어. 해당 발명의 <구성들>, 발명의 <목적>, 발명의 <효과>를 작성해줘.
      입력에 영어 키가 포함되어 있다면 다음과 같이 매칭해서 해석해줘:
      - CoreComponents → 구성들
      - Solution → 목적/해결수단
      - Effects → 효과
      발명 : {invention}
      누락된 부분이 있다면 추론해서 채워넣어줘.
      절대로 누락이 발생하지 않도록 해줘.
      기존에 포함된 내용이 있다면 내용을 유지해줘

    variables:
      - name: "{invention}"              # 예: invention_title
        description: ""       # 예: 발명의 명칭

  - id: 2
    name: "Avoidance Strategy"
    model: "gpt-4o-2024-08-06"
    role: "유사특허 분석을 통해 회피전략과 새 발명의 개요를 도출하는 프롬프트"
    content: |
      {similar_patents_text}

      위에 제시된 <유사 특허>의 청구항들을 기준으로, <공통적인 요소>와 <차별화 요소>를 정리하고,
      이를 바탕으로 <하고자 하는 발명>을 특허로 출원한다고 했을 때, <공통적인 요소>를 포함하면서도,
      <차별화 요소>들이 지니는 유사특허들의 특이점과 구체적으로 어떻게 다르게 구성할 수 있는지 수립한 회피 전략을 반영한
      <새 발명의 개요>와 <새 발명의 유사특허 회피전략>를 정리해주고, <하고자 하는 발명>이
      '방법 발명','물건 발명','제조 방법이 기재된 물건 발명' 세 분류 중 어디에 속하는지 <구분>해줘.
      청구하고자하는 청구항의 <말미>도 작성해줘. <하고자 하는 발명> {text}

    variables:
      - name: "{similar_patents_text}"
        description: ""
      - name: "{text}"
        description: ""

  - id: 3
    name: "Claims Generation"
    model: "gpt-5.2"
    role: "발명 개요·회피전략을 바탕으로 독립항 1개 + 종속항 N-1개를 생성하는 메인 청구항 생성 프롬프트 (few-shot 포함)"
    content: |
      <예시 발명의 명칭>과 <예시 발명의 개요>을 바탕으로 작성된 <예시 청구항>은 발명에서 세부적인 차별화 요소를
      설명한 1개의 <독립항>과 각 <독립항>의 모든 구성을 포함하면서 기술적으로 부가하여 구체화하는 <종속항>으로
      구성되어 작성된 위의 예시의 서술 방식과 논리 구조를 참고하여 <하고자 하는 발명>과 <발명의 개요>내용을
      특허로 출원하기 위해서 차별화된 요소를 최대한 길게 서술한

      <청구항1>
      <청구항1의 종속항1>
      ... (claim_number - 1개)

      을 생성해줘. 각 청구항을 작성할 때, 필요한 구성들을 나열해주고, 각 구성을 구체적이고 유기적으로 만들어줘.
      각 구성이 어떻게 형성되는지도 포함해서 작성해줘.
      종속항은 독립항과 차이를 추가해서 작성해줘.
      누가 보아도 똑같이 따라 할 수 있도록 명확하게 한글로 작성해줘.
      <하고자 하는 발명> {text}

      {response_prompt}

    variables:
      - name: "{text}"
        description: ""
      - name: "{response_prompt}"
        description: ""

  - id: 4
    name: "Claims Summary"
    model: "gpt-5.2"
    role: "청구항을 요약하고 목적과 설명을 추출하는 프롬프트"
    content: |
      {text} 다음 특허의 청구항을 보고 <요약>해줘. <목적>도 작성하고, 필요한 <설명>을 해줘

    variables:
      - name: "{text}"
        description: ""

  - id: 5
    name: "Refine Claims"
    model: "gpt-4o-2024-08-06"
    role: "KIPO/특허청 심사 기준에 맞게 청구항을 정제하는 프롬프트 — 명확성·선행사·카테고리 통일"
    content: |
      당신은 대한민국의 숙련된 변리사(Patent Attorney)입니다.
      주어진 초안({response2})을 바탕으로, 한국 특허청(KIPO)의 심사 기준에 완벽히 부합하는 특허 청구범위를 작성하세요.

      [작성 지침]
      1. 명확성(Clarity) 확보: 구성요소 간의 결합 관계와 기능적 연결을 명확히 서술하세요.
        모호한 표현(예: '약', '대략', '적절한')을 배제하고, 명확한 기술적 용어를 사용하세요.

      2. 청구항 형식 준수:
        - 모든 청구항은 하나의 문장으로 종결되어야 합니다.
        - 독립항은 발명의 필수 구성요소만을 포함하여 권리 범위를 넓게 설정하세요.
        - 종속항은 구체적인 실시예, 수치 한정, 또는 부가 기능을 포함하여 단계적으로 작성하세요.
        - 문장 끝은 명사형(예: '...를 포함하는, [장치 명칭].', '...단계.', '...시스템.')으로 통일하세요.

      3. 선행사(Antecedent Basis) 일치:
        - 청구항 내에서 처음 등장하는 구성요소는 서수 없이 기재하고, 이후 다시 언급될 때는 반드시 '상기(said)'를 붙여 지칭하세요.
        - (예: '데이터 처리부'가 처음 나오면 '데이터 처리부', 그 다음부터는 '상기 데이터 처리부')

      4. 발명의 카테고리 통일:
        - 물건의 발명(장치, 시스템)인지 방법의 발명(방법, 프로세스)인지 명확히 하여 서술어를 통일하세요.
        (장치인 경우: '~부', '~모듈' / 방법인 경우: '~하는 단계')

      5. 출력 형식 및 문장 종결(중요):
        - 별도의 '청구항' 텍스트 라벨 없이, 숫자(1., 2., ...)로만 문단을 구분하세요.
        - 모든 청구항의 문장은 반드시 해당 '발명의 명칭(카테고리)'으로 끝나야 합니다.
        - (장치 청구항 예시: '...구성요소 A; 및 ...구성요소 B;를 포함하는, [발명의 명칭].')
        - (방법 청구항 예시: '...단계; 및 ...단계;를 포함하는, [발명의 명칭].')
        - 청구항은 반드시 한 문장으로 종결되어야 합니다.
    variables:
      - name: "{response2}"
        description: ""

  - id: 6
    name: "Spec Generation"
    model: "gpt-5.2"
    role: "청구범위를 기반으로 명세서 섹션(발명의 명칭·기술분야·배경기술 등 9종)을 생성하는 프롬프트"
    content: |
      '{text}'을 특허출원하려고해, 해당 청구범위에 맞게 <{prefix_name}>을 {prefix} 다시 작성해줘.
      <{prefix_name}>은 예시와 비슷한 길이로 작성해줘.
      참고할 예시는 다음과 같아. {example}
      형식에 맞지 않는 얘기는 <설명>에 넣어줘.

    variables:
      - name: "{text}"
        description: ""
      - name: "{prefix_name}"
        description: ""
      - name: "{prefix}"
        description: ""
      - name: "{example}"
        description: ""

  - id: 7
    name: "Spec Description"
    model: "gpt-5.2"
    role: "청구항별로 명확성·지지요건·실시가능성을 보완하여 구체적 내용을 작성하는 프롬프트"
    content: |
      다음은 청구항 {claim_number}입니다.
      '{claim_text}'을 명확성(Clarity) 결여, 지지요건(Support) 결여, 실시가능성(Enablement) 결여
      사항들을 보완해서 <발명을 실시하기 위한 구체적인 내용>를 다시 작성해줘.
      형식에 맞지 않는 얘기는 <설명>에 넣어줘.

    variables:
      - name: "{claim_number}"
        description: ""
      - name: "{claim_text}"
        description: ""

  - id: 8
    name: "Spec Embodiment"
    model: "gpt-5.2"
    role: "청구항과 도면 설명을 기반으로 구체적인 실시예를 생성하는 프롬프트(700자 이상)"
    content: |
      [청구항 {claim_number}] : '{claim_text}'
      [도면의 설명]: '{drawings}'을 특허출원하려고해, 해당 청구범위에 맞게 실시예를 작성해줘.
      실시예는 {output_length}자 이상으로 작성해줘.
      <실시예>는 예시와 비슷한 길이로 작성해줘.
      참고할 예시는 다음과 같아. {example}
      형식에 맞지 않는 얘기는 <설명>에 넣어줘.
      실시예 작성에 주로 참고한 도면 번호(1부터 시작하는 정수, 도면이 없으면 빈 배열)를 <사용_도면> 배열에 넣어줘.

    variables:
      - name: "{claim_number}"
        description: ""
      - name: "{claim_text}"
        description: ""
      - name: "{drawings}"
        description: ""
      - name: "{output_length}"
        description: ""
      - name: "{example}"
        description: ""

  - id: 9
    name: "Drawing Description"
    model: "gpt-5.2"
    role: "도면 설명으로부터 특허명세서의 도면의 간단한 설명을 작성하는 프롬프트"
    content: |
      도면의 설명이야. '{text}' 이로부터 특허명세서에 들어가는 도면의 간단한 설명을 작성해줘.
      참고할 예시는 다음과 같아. {example}

    variables:
      - name: "{text}"
        description: ""
      - name: "{example}"
        description: ""
