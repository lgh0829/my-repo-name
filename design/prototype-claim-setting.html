<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 40px; background: #f5f5f5; }
  .panel { background: white; border-radius: 12px; padding: 24px; width: 280px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  h2 { font-size: 16px; font-weight: 700; margin: 0 0 16px; }
  .label { font-size: 12px; color: #666; margin-bottom: 8px; }
  .category-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .row { display: flex; align-items: center; gap: 8px; }

  .btn {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: white;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    color: #333;
    transition: all 0.15s;
  }
  .btn.selected {
    background: #3355CC;
    border-color: #3355CC;
    color: white;
    font-weight: 600;
  }

  /* 드롭다운 자리 — 항상 같은 너비 차지 */
  .dropdown-slot {
    width: 72px;
    flex-shrink: 0;
    visibility: hidden; /* 공간은 유지, 보이지 않음 */
  }
  .dropdown-slot.visible {
    visibility: visible;
  }
  .dropdown {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    background: white;
    cursor: pointer;
    color: #333;
  }

  .footer { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 14px; color: #333; }
  .footer strong { font-size: 18px; font-weight: 700; }
  .cta { width: 100%; padding: 13px; background: #3355CC; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .cta:hover { background: #2244BB; }
</style>
</head>
<body>
<div class="panel">
  <h2>청구항 설정</h2>
  <div class="label">발명 카테고리</div>
  <div class="category-list" id="list">
    <div class="row">
      <button class="btn selected" onclick="select(this)">장치 발명</button>
      <div class="dropdown-slot visible">
        <select class="dropdown">
          <option>8개</option><option>5개</option><option>3개</option>
        </select>
      </div>
    </div>
    <div class="row">
      <button class="btn" onclick="select(this)">방법 발명</button>
      <div class="dropdown-slot">
        <select class="dropdown">
          <option>8개</option><option>5개</option><option>3개</option>
        </select>
      </div>
    </div>
    <div class="row">
      <button class="btn" onclick="select(this)">제법 발명</button>
      <div class="dropdown-slot">
        <select class="dropdown">
          <option>8개</option><option>5개</option><option>3개</option>
        </select>
      </div>
    </div>
    <div class="row">
      <button class="btn" onclick="select(this)">시스템 발명</button>
      <div class="dropdown-slot">
        <select class="dropdown">
          <option>8개</option><option>5개</option><option>3개</option>
        </select>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>생성될 청구항</span>
    <strong>총 3개</strong>
  </div>
  <button class="cta">청구항 생성</button>
</div>

<script>
function select(btn) {
  const row = btn.closest('.row');
  const slot = row.querySelector('.dropdown-slot');
  const isSelected = btn.classList.contains('selected');

  if (isSelected) {
    // 토글 해제
    btn.classList.remove('selected');
    slot.classList.remove('visible');
  } else {
    // 선택
    btn.classList.add('selected');
    slot.classList.add('visible');
  }
}
</script>
</body>
</html>
